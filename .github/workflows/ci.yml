name: CI/CD Pipeline (refresh)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: docker buildx create --use

      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Backend: build Go binary on runner (proxy works), then dockerize
      - name: Build user-service
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "linux"
          $env:GOPROXY = "https://proxy.golang.org,direct"
          $env:GOSUMDB = "off"
          $env:HTTP_PROXY = "http://127.0.0.1:1081"
          $env:HTTPS_PROXY = "http://127.0.0.1:1081"
          $env:NO_PROXY = "localhost,127.0.0.1"
          Remove-Item src/backend/user-service/go.sum -Force -ErrorAction SilentlyContinue
          cd src/backend/user-service
          go mod download
          go build -mod=mod -o user-service ./cmd

      - name: Build and push user-service Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/user-service:latest -f ./src/backend/user-service/Dockerfile ./src/backend/user-service
          docker push ghcr.io/${{ github.repository }}/user-service:latest

      # Frontend: Docker build handles npm install
      - name: Build and push frontend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest -f ./src/frontend/Dockerfile ./src/frontend
          docker push ghcr.io/${{ github.repository }}/frontend:latest

      # Kubernetes manifests
      - name: Apply K8s configs
        run: |
          kubectl apply -f kubernetes/base/frontend.yaml

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy user-service
        run: kubectl set image deployment/user-service user-service=ghcr.io/techshared/tongxingzhe/user-service:latest -n tongxingzhe-dev

      - name: Deploy frontend
        run: kubectl set image deployment/frontend frontend=ghcr.io/techshared/tongxingzhe/frontend:latest -n tongxingzhe-dev